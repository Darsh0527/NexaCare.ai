version: '3.8'

services:
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000/api
      - NEXT_PUBLIC_ML_URL=http://ml-service:8000
    depends_on:
      - backend
      - ml-service

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=${DATABASE_URL:-postgresql://db:5432/nexacare}
      - JWT_SECRET=${JWT_SECRET:-nexacare_secret_2026}
      - ML_SERVICE_URL=http://ml-service:8000
      - FRONTEND_URL=http://frontend:3000

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
